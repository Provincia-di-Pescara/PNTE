description:
  it:
    localisedName: GTE-Abruzzo
    shortDescription: >
      Gestionale SaaS multi-tenant per il ciclo di vita e il rilascio delle
      autorizzazioni per i Trasporti Eccezionali, conforme alle linee guida MIT 2027.
    longDescription: |
      GTE-Abruzzo è la piattaforma web a riuso sviluppata dalla Provincia di Pescara
      come ente capofila per gestire in modalità SaaS (Software as a Service) l'intero
      iter burocratico dei Trasporti Eccezionali sull'intero territorio regionale.

      Il software permette ad aziende e agenzie di pratiche auto di autenticarsi tramite
      SPID/CIE, compilare la propria anagrafica mezzi (Garage Virtuale) e tracciare su
      mappa il percorso richiesto. Grazie all'integrazione di un motore GIS (OSRM) e alle
      query spaziali su MariaDB 11.4 LTS, il sistema calcola automaticamente le
      intersezioni con i confini comunali e provinciali per determinare le competenze di
      ogni ente attraversato.

      Gestisce in autonomia l'istruttoria, l'invio delle richieste di Nulla Osta agli enti
      terzi (Comuni, ANAS, Autostrade), la generazione dello IUV per il pagamento
      dell'indennizzo di maggiore usura stradale tramite PagoPA e la ripartizione dei
      fondi. Genera l'autorizzazione in PDF, la protocolla e la firma digitalmente tramite
      API di Firma Remota PAdES.

      Il sistema è architetturalmente predisposto per l'integrazione con AINOP (Archivio
      Informatico Nazionale delle Opere Pubbliche) tramite PDND, per la verifica
      automatica della tenuta infrastrutturale di ponti e viadotti lungo il percorso
      autorizzativo, in anticipo sulle scadenze normative MIT 2027.
    features:
      - Integrazione nativa SPID e CIE tramite Socialite
      - Integrazione nativa PagoPA per generazione IUV e ascolto Ricevuta Telematica
      - Motore WebGIS con OSRM per routing snap-to-road vettoriale
      - Analisi spaziale MariaDB per calcolo esatto dei km di competenza per Comune/Ente
      - Predisposizione per integrazione AINOP via PDND (verifica portata ponti/viadotti)
      - Generazione PDF via Headless Chrome con QR Code di validazione pubblica
      - Integrazione API Protocollo Informatico e Firma Digitale Remota PAdES
      - Architettura Multi-tenant SaaS con RBAC per estensione regionale e nazionale
      - Conforme alle Linee Guida AgID e alle direttive MIT con orizzonte 2027

