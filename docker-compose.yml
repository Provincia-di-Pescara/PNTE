services:

  # ── Application (PHP-FPM + Nginx) ─────────────────────────────────────────
  # Image is built by CI and pushed to GHCR. APP_VERSION selects the tag
  # (e.g. latest, v0.2.0, dev). Version metadata is baked into the image.
  app:
    image: ghcr.io/provincia-pescara/gte-abruzzo-app:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - gte

  # ── Database (PostgreSQL 16 + PostGIS 3.4) ───────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_DATABASE:-gte_abruzzo}"
      POSTGRES_USER: "${DB_USERNAME:-gte}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gte

  # ── Cache / Queue (Redis 7) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - gte

  # ── GIS Routing (OSRM) ────────────────────────────────────────────────────
  # Requires pre-processed Abruzzo road graph. See docs/GIS_ROUTING.md.
  # Pre-processing steps (run once, outside this compose):
  #   docker run --rm -v $(pwd)/osrm-data:/data ghcr.io/project-osrm/osrm-backend \
  #     osrm-extract -p /opt/car.lua /data/abruzzo-latest.osm.pbf
  #   (then osrm-partition and osrm-customize)
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    restart: unless-stopped
    command: osrm-routed --algorithm mld /data/abruzzo-latest.osrm
    volumes:
      - ./osrm-data:/data:ro
    ports:
      - "5000:5000"
    profiles:
      - gis
    networks:
      - gte

volumes:
  db_data:
  redis_data:
  app_storage:

networks:
  gte:
    driver: bridge
