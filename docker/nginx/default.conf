server {
    listen 80 default_server;
    server_name _;

    root  /var/www/html/public;
    index index.php;
    charset utf-8;

    # ── Security headers (AgID / PA hardening) ─────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                                always;
    add_header X-Content-Type-Options    "nosniff"                                   always;
    add_header X-XSS-Protection          "1; mode=block"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"           always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"  always;
    # HSTS — enable only after TLS is confirmed in production
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"     always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.bunny.net; font-src 'self' https://fonts.bunny.net; img-src 'self' data: https:; connect-src 'self';" always;

    # ── Routing ────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # ── PHP-FPM ────────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass            unix:/var/run/php-fpm.sock;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;
        fastcgi_read_timeout    60;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         4 16k;
        fastcgi_hide_header     X-Powered-By;
    }

    # ── Static assets ──────────────────────────────────────────────────────
    location ~* \.(css|js|gif|ico|jpeg|jpg|png|svg|woff|woff2|webp)$ {
        expires           1y;
        add_header        Cache-Control "public, immutable";
        access_log        off;
    }

    # Block hidden files (except .well-known)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
